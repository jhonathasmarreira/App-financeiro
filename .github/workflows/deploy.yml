name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/financial-control-app-Q4t7S

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/db/migrations:/flyway/sql \
            -v ${{ github.workspace }}/flyway.conf:/flyway/conf/flyway.conf \
            flyway/flyway:10 \
            -url="jdbc:postgresql://${{ secrets.SUPABASE_DB_HOST }}:5432/postgres" \
            -user="postgres" \
            -password="${{ secrets.SUPABASE_DB_PASSWORD }}" \
            migrate

  build:
    name: Build app
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
